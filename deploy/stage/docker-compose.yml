services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ./app.env
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.27.1
    depends_on:
      - app
    ports:
      - "${HOST_PORT:-8082}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped
